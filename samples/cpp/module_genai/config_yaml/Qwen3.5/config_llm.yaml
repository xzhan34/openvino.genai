# ----------------------------------------------------------------------
# GLOBAL CONFIGURATION — Text-only LLM pipeline (no vision)
# ----------------------------------------------------------------------
global_context:
  model_type: "qwen3_5"

# ----------------------------------------------------------------------
# MODULES DEFINITION
# ----------------------------------------------------------------------
pipeline_modules:

  # --- 0. Parameter Module ---
  pipeline_params:
    type: "ParameterModule"
    outputs:
      - name: "prompt"
        type: "String"

  # --- 1. Prompt Encode Module ---
  prompt_encoder:
    type: "TextEncoderModule"
    device: "GPU"
    inputs:
      - name: "prompt"
        type: "String"
        source: "pipeline_params.prompt"
    outputs:
      - name: "input_ids"
        type: "OVTensor"
      - name: "mask"
        type: "OVTensor"
    params:
      model_path: "./tests/module_genai/cpp/test_models/Qwen3.5-0.8B/"

  # --- 2. LLM Inference Module ---
  llm_inference:
    type: "LLMInferenceSDPAModule"
    description: "LLM module for SDPA (stateful) pipeline — text only"
    device: "GPU"
    inputs:
      - name: "input_ids"
        type: "OVTensor"
        source: "prompt_encoder.input_ids"
    outputs:
      - name: "generated_text"
        type: "String"
    params:
      model_path: "./tests/module_genai/cpp/test_models/Qwen3.5-0.8B/"
      max_new_tokens: "16"

  # --- 3. Result Module ---
  pipeline_result:
    type: "ResultModule"
    description: "Collects final results and formats the output structure."
    inputs:
      - name: "generated_text"
        type: "String"
        source: "llm_inference.generated_text"
